# RuboCop config. Every cop is enabled (none disabled); only a few settings are
# tuned: double-quoted strings, keyword args excluded from the parameter-list
# limit, and a complexity gate (Metrics) kept close to the defaults.

AllCops:
  TargetRubyVersion: 3.4
  NewCops: disable
  SuggestExtensions: false

# The project uses double quotes for strings, single quotes inside #{...}.
Style/StringLiterals:
  EnforcedStyle: double_quotes

# Complexity gate (à la Sandi Metz). After the #1 refactor (cmd_run → Runner
# class of small methods) these limits sit close to RuboCop's defaults (shown in
# brackets); keep tightening toward them as the code shrinks.
Metrics/MethodLength:           { Max: 18 }   # default 10
Metrics/AbcSize:                { Max: 21 }   # default 17
Metrics/CyclomaticComplexity:   { Max: 8 }    # default 7
Metrics/PerceivedComplexity:    { Max: 9 }    # default 8
# Runner grew with layers/focus/reconnect/suspend; splitting it into
# collaborators is a future cleanup (until then, 140).
Metrics/ClassLength:            { Max: 140 }  # default 100
Metrics/ModuleLength:           { Max: 115 }  # default 100
Metrics/ParameterLists:
  CountKeywordArgs: false   # keyword args are self-documenting; the limit targets positional
