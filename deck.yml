# deck.yml — layout pessoal do Fabio (KDE) para o FIFINE D6.
# Rode com:  nix-shell --run "ruby deck.rb run deck.yml"
#
# Layout (índice natural, 0 = topo-esquerda):
#     0   1   2   3   4      apps de dev
#     5   6   7   8   9      navegadores / web
#    10  11  12  13  14      web tools + mídia + sistema
#
# ── PRÉ-REQUISITOS ────────────────────────────────────────────────────────────
# • cycle-or-launch: os comandos rodam em `/bin/sh -c`, que NÃO carrega funções
#   do seu .bashrc/.zshrc. Se o seu cycle-or-launch for uma FUNÇÃO de shell, ele
#   não será encontrado. Deixe-o como executável no PATH, ex.:
#       install -Dm755 bin/cycle-or-launch ~/.local/bin/cycle-or-launch
#   (já incluí uma versão em bin/cycle-or-launch baseada na sua descrição.)
# • As páginas web abrem no navegador padrão via `xdg-open`.
# • Mic Mute usa wpctl (PipeWire) com fallback pactl; Maximizar usa gdbus
#   (atalho do KWin); Lock usa loginctl. Ícones (icon:) vêm do tema do sistema.
#
# Personalize quando precisar (2º arg do cycle-or-launch = comando p/ abrir):
#   - RubyMine: ajuste se o launcher não estiver no PATH (JetBrains Toolbox).
#   - YT Music: é um app do Wavebox; o foco usa a classe da janela. O fallback
#     abre o Wavebox — troque o 2º arg se quiser abrir direto o app.

settings:
  brightness: 80
  # Telas de boas-vindas (ao iniciar o `run`) e de "parado" (ao encerrar):
  welcome:
    text: "Olá!"
    background: "1e1e2e"
    color: "ffffff"
  goodbye:
    text: "Deck OFF"
    background: "2a0a0a"
    color: "ff6666"
    brightness: 25

keys:
  # ── linha 1: apps de dev (logos do tema de ícones; text = fallback) ─────────
  0:
    icon: ["org.kde.konsole", "utilities-terminal", "terminal"]
    text: "Terminal"
    background: "1e1e1e"
    command: "cycle-or-launch konsole konsole"

  1:
    icon: ["code", "vscode", "visual-studio-code", "com.visualstudio.code", "code-oss"]
    text: "VS Code"
    background: "1e1e1e"
    command: "cycle-or-launch code code"

  2:
    icon: ["/home/fabiosammy/.nix-profile/ruby-mine/bin/rubymine.png"]
    text: "RubyMine"
    background: "1e1e1e"
    command: "cycle-or-launch rubymine /home/fabiosammy/.nix-profile/ruby-mine/bin/rubymine.sh"

  3:
    icon: ["slack"]
    text: "Slack"
    background: "1e1e1e"
    command: "cycle-or-launch slack slack"

  4:
    icon: ["1password", "1Password"]
    text: "1Password"
    background: "1e1e1e"
    command: "cycle-or-launch 1password 1password"

  # ── linha 2: navegadores / web ─────────────────────────────────────────────
  5:
    icon: ["firefox", "org.mozilla.firefox", "firefox-esr"]
    text: "Firefox"
    background: "1e1e1e"
    command: "cycle-or-launch firefox firefox"

  6:
    icon: ["wavebox"]
    text: "Wavebox"
    background: "1e1e1e"
    command: "cycle-or-launch wavebox wavebox"

  7:
    text: "YT Music"
    background: "ff0033"
    command: "cycle-or-launch wavebox-cinhimbnkkaeohfgghhklpknlkffjgod-Default wavebox"

  8:
    text: "GitHub"
    background: "24292e"
    command: "xdg-open https://github.com/orgs/glssolutions/repositories"

  9:
    text: "Datadog"
    background: "632ca6"
    command: "xdg-open https://app.datadoghq.com/apm/home"

  # ── linha 3: web tools + mídia + sistema ───────────────────────────────────
  10:
    text: "Aikido"
    background: "5849be"
    command: "xdg-open https://app.aikido.dev/queue"

  11:
    text: "Mic Mute"
    background: "b02e2e"
    # PipeWire (NixOS/KDE): wpctl é o caminho certo; pactl como fallback.
    command: "wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle || pactl set-source-mute @DEFAULT_SOURCE@ toggle"

  12:
    text: "Maximizar"
    background: "2e7d32"
    # KDE Wayland: invoca o atalho do KWin via D-Bus (alterna maximizar/restaurar).
    command: 'gdbus call --session --dest org.kde.kglobalaccel --object-path /component/kwin --method org.kde.kglobalaccel.Component.invokeShortcut "Window Maximize"'

  13:
    text: "Lock"
    background: "37474f"
    command: "loginctl lock-session"

  14:
    text: "Restart Screen"
    background: "c0392b"
    command: "~/Desenvolvimento/restart-screen.sh"
